# db-network-policy.yaml (모니터링 요원 추가 버전)

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-protection
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: mysql  # 이 방화벽은 MySQL 파드를 보호합니다.
  policyTypes:
  - Ingress
  ingress:
  # 👉 [출입증 1번] PHP 파드 허용
  - from:
    - podSelector:
        matchLabels:
          app: php
    ports:
    - protocol: TCP
      port: 3306

  # 👉 [출입증 2번] AWS 동기화를 위해 외부(AWS VPC 및 Tailscale)에서 들어오는 IP 대역 통째로 허용!
  - from:
    - ipBlock:
        cidr: 100.64.0.0/10   # Tailscale 기본 IP 대역 (이 대역에서 오는 건 다 허용)
  - from:
    - ipBlock:
        cidr: 10.0.0.0/16     # AWS 팀원의 VPC 사설망 대역 (팀원 설정에 따라 다를 수 있음, 예시)
    ports:
    - protocol: TCP
      port: 3306

  # 👉 [출입증 3번] 추가! 모니터링 데이터를 수집할 mysqld-exporter 파드 허용
  - from:
    - podSelector:
        matchLabels:
          app: mysql-exporter
    ports:
    - protocol: TCP
      port: 3306