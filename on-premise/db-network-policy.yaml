# db-network-policy.yaml (완벽 교정본)

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-protection
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: mysql # 이 방화벽은 MySQL 파드를 보호합니다.
  policyTypes:
    - Ingress
  ingress:
    # 👉 [출입증 1번] PHP 파드 허용
    - from:
        - podSelector:
            matchLabels:
              app: php
      ports:
        - protocol: TCP
          port: 3306

    # 👉 [출입증 2번] K8s 내부의 Tailscale 라우터 파드 허용
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app: tailscale
      ports:
        - protocol: TCP
          port: 3306

    # 👉 [출입증 3번] 외부(Tailscale 망 및 AWS VPC)에서 들어오는 IP 대역 통째로 허용
    - from:
        - ipBlock:
            cidr: 100.64.0.0/10 # Tailscale 기본 IP 대역
        - ipBlock:
            cidr: 192.168.0.0/16 # AWS 팀원의 VPC 사설망 대역 (팀원 설정에 맞게 수정!)
      ports:
        - protocol: TCP
          port: 3306

    # 👉 [출입증 4번] 모니터링 데이터를 수집할 mysqld-exporter 파드 허용
    - from:
        - podSelector:
            matchLabels:
              app: mysql-exporter
      ports:
        - protocol: TCP
          port: 3306
