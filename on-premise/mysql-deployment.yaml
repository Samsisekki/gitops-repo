apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-node-2 # 핵심! 워커 노드 2번에만 뜨도록 강제 지정
      containers:
      - name: mysql
        image: mysql:8.0 # 안정적인 MySQL 8.0 버전
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "password123!" # 실제 운영 환경에서는 Secret으로 빼야 하지만, 프로젝트를 위해 하드코딩
        - name: MYSQL_DATABASE
          value: "dr_test_db" # 미리 만들어둘 테스트용 DB 이름
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql # 컨테이너 내부의 DB 저장 경로
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: mysql-pvc # 아까 만든 PVC(NFS)와 연결
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  type: NodePort
  ports:
  - port: 3306
    targetPort: 3306
    nodePort: 30306  # 워커 노드에 뚫어둘 고정 포트 (30000~32767 사이)
  selector:
    app: mysql