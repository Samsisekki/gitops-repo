# 웹/앱 pod 및 ingress 연결

# 1. 화면에 보여줄 임시 PHP 코드 (ConfigMap)
apiVersion: v1
kind: ConfigMap
metadata:
  name: php-index
data:
  index.php: |
    <?php
    echo "<h1>성공! K8s PHP 웹 서버에 접속하셨습니다!</h1>";
    echo "<h2>현재 이 파드가 떠 있는 노드: " . gethostname() . "</h2>";
    echo "<p>Cloudflare Tunnel -> NGINX Ingress -> PHP Pod 통신 완벽 성공!</p>";
    ?>
---
# 2. PHP 파드 (워커 노드 1번 고정)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
spec:
  replicas: {{ .Values.replicaCount }} # values.yaml에서 숫자를 가져옴!
  selector:
    matchLabels:
      app: php
  template:
    metadata:
      labels:
        app: php
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.phpApp.nodeSelector }}
      containers:
      - name: php
        image: {{ .Values.phpApp.image }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: code
          mountPath: /var/www/html
      volumes:
      - name: code
        configMap:
          name: php-index
---
# 3. K8s 내부 통신용 서비스
apiVersion: v1
kind: Service
metadata:
  name: php-service
spec:
  selector:
    app: php
  ports:
  - port: 80
    targetPort: 80
---
# 4. NGINX Ingress 라우팅 규칙 (정문 안내데스크)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: php-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: php-service
            port:
              number: 80