# 웹/앱 pod 및 ingress 연결
---
# 2. PHP 파드 (워커 노드 1번 고정)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
spec:
  replicas: {{ .Values.replicaCount }} # values.yaml에서 숫자를 가져옴!
  selector:
    matchLabels:
      app: php
  template:
    metadata:
      labels:
        app: php
    spec:
      containers:
      - name: php
        image: {{ .Values.phpApp.image }}
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: {{ .Values.db.host | quote }} # quote : 문자열로 인식하게 해주는 helm 함수
        - name: DB_USER
          value: {{ .Values.db.user | quote }}
        - name: DB_PASSWORD
          value: {{ .Values.db.password | quote }}
        - name: DB_NAME
          value: {{ .Values.db.name | quote }}
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        
---
# 3. AWS ALB 연결용 서비스
apiVersion: v1
kind: Service
metadata:
  name: php-service
spec:
  type: NodePort
  selector:
    app: php
  ports:
  - port: 80
    targetPort: 80
---
# 4. 기존 NGINX Ingress 라우팅 규칙 (사용 안함, 참고용으로 주석 처리)
# apiVersion: networking.k8s.io/v1
# kind: Ingress
# metadata:
#   name: php-ingress
